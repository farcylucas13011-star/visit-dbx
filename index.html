<style>

label.lbl{display:block;font-size:10px;color:#555;letter-spacing:1.5px;margin-bottom:4px;text-transform:uppercase}

.tooltip-box{display:none;position:fixed;background:#1A1A2E;border:1px solid #D4AF3740;border-radius:8px;padding:10px 14px;font-size:12px;color:#E0D8C8;width:260px;max-width:calc(100vw - 40px);max-height:40vh;overflow-y:auto;z-index:9999;box-shadow:0 4px 24px #000000CC;line-height:1.6;word-break:break-word;white-space:pre-wrap;overflow-wrap:break-word}

</style>

<body>
<div id="layout">
  <div id="header">

<script>
const PRICES=["Gratuit","€","€€","€€€","€€€€"];
const PRICE_ORDER={"Gratuit":0,"€":1,"€€":2,"€€€":3,"€€€€":4};

// ── PRICE HELPERS ─────────────────────────────────────────────────────────
function getMinPrice(item){
  // From detailed prices array
  if(item.prixDetails&&item.prixDetails.length>0){
    var vals=[];item.prixDetails.forEach(function(p){var v=parseFloat(p.prixFixe||p.fMin||p.bsMin||p.valeur||0);if(v>0)vals.push(v);});
    if(vals.length>0)return Math.min.apply(null,vals);
  }
  if(item.prixMin&&parseFloat(item.prixMin)>0)return parseFloat(item.prixMin);
  if(item.prixMax&&parseFloat(item.prixMax)>0)return parseFloat(item.prixMax);
  if(item.prixUnique&&parseFloat(item.prixUnique)>0)return parseFloat(item.prixUnique);
  return null;
}
function getMaxPrice(item){
  if(item.prixDetails&&item.prixDetails.length>0){
    var vals=[];item.prixDetails.forEach(function(p){var v=parseFloat(p.prixFixe||p.fMin||p.bsMin||p.valeur||0);if(v>0)vals.push(v);});
    if(vals.length>0)return Math.max.apply(null,vals);
  }
  if(item.prixMax&&parseFloat(item.prixMax)>0)return parseFloat(item.prixMax);
  if(item.prixMin&&parseFloat(item.prixMin)>0)return parseFloat(item.prixMin);
  if(item.prixUnique&&parseFloat(item.prixUnique)>0)return parseFloat(item.prixUnique);
  return null;
}
function formatPrix(item){
  var mn=getMinPrice(item),mx=getMaxPrice(item);
  if(!mn&&!mx)return h(item.price)||"";
  if(mn&&mx&&mn!==mx)return mn+" – "+mx+" AED";
  if(mn)return mn+" AED";
  return mx+" AED";
}
const EMOJIS=["🍽️","🎯","🏨","🛍️","🌅","🏖️","🚤","🎨","🌿","🍸","☕","🏌️","🤿","🐪","🌃","💆","🌊","💎","🏪","🚁","🕌","🏔️","🎭","🎪","🏋️","🎁","🏟️","🧖","🎶","🛶"];
const PAL=["#E05555","#4A9EE0","#4CAF7D","#A06CD5","#E8883A","#E0A030","#3ABFBF","#E05599","#7AA84A","#5580E0","#C0704A","#FF6B9D"];
const SB_URL="https://azwrrsvnnvuywoyhmuvz.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6d3Jyc3ZubnZ1eXdveWhtdXZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MTYwNDEsImV4cCI6MjA4ODk5MjA0MX0.We4h0frQTCtrLzaIrf6KtPx2lKhW5VLkAx2xoIlwQlo";

var tipDescs={};
const S={items:[],cats:[],zones:[],users:[],tab:"tout",view:"listing",search:"",detail:null,form:null,catForm:null,zoneForm:null,filterPanel:false,sortBy:"nom",filterCat:"",filterZone:"",filterPrice:"",session:null,loginForm:false,userPanel:false};
let mMap=null,miniMap=null,mMarkers=[],miniMk=null;

// ── SUPABASE ──────────────────────────────────────────────────────────────
const SB_HDR={"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY};
async function sbGet(id){
  try{const r=await fetch(SB_URL+"/rest/v1/listings?id=eq."+id+"&select=data",{headers:SB_HDR});const d=await r.json();return d&&d[0]?d[0].data:null;}
  catch(e){return null;}
}
async function sbSet(id,data){
  try{await fetch(SB_URL+"/rest/v1/listings?id=eq."+id,{method:"PATCH",headers:{...SB_HDR,"Prefer":"return=minimal"},body:JSON.stringify({data})});}
  catch(e){toast("⚠️ Erreur sauvegarde");}
}
async function sbInit(id){
  await fetch(SB_URL+"/rest/v1/listings",{method:"POST",headers:{...SB_HDR,"Prefer":"ignore-duplicates"},body:JSON.stringify({id,data:[]})});
}
const DEFAULT_ADMIN={id:"admin-1",username:"lucas",password:"admin123",droits:{consulter:true,creer:true,modifier:true,supprimer:true,categories:true,quartiers:true,utilisateurs:true}};

async function load(){
  document.getElementById("content").innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:14px"><div style="font-size:36px">🇦🇪</div><div style="color:#D4AF37;font-size:13px;letter-spacing:2px">Chargement…</div></div>';
  const [it,ct,zt]=await Promise.all([sbGet("items"),sbGet("cats"),sbGet("zones")]);
  S.items=Array.isArray(it)?it:[];
  S.cats=Array.isArray(ct)?ct:defCats();
  S.zones=Array.isArray(zt)?zt:[];
  if(!Array.isArray(it)){await sbInit("items");sbSet("items",S.items);}
  if(!Array.isArray(ct)){await sbInit("cats");sbSet("cats",S.cats);}
  if(!Array.isArray(zt)){await sbInit("zones");sbSet("zones",S.zones);}
  // Load users separately with fallback
  try{
    var ut=await sbGet("users");
    S.users=Array.isArray(ut)&&ut.length>0?ut:[DEFAULT_ADMIN];
    if(!Array.isArray(ut)||ut.length===0){await sbInit("users");sbSet("users",S.users);}
  }catch(e){S.users=[DEFAULT_ADMIN];}
  // Restore session from localStorage
  var savedSession=localStorage.getItem("uae-session");
  if(savedSession){
    try{
      var sess=JSON.parse(savedSession);
      var u=S.users.find(function(u){return u.id===sess.id&&u.password===sess.password;});
      if(u)S.session=u;
    }catch(e){}
  }
}
const saveU=()=>sbSet("users",S.users);

function hasDroit(d){return S.session&&S.session.droits&&S.session.droits[d];}
const saveI=()=>sbSet("items",S.items);
const saveC=()=>sbSet("cats",S.cats);
const saveZ=()=>sbSet("zones",S.zones);

function defCats(){return[
  {id:"r",label:"Restaurant",icon:"🍽️",color:"#E05555"},
  {id:"a",label:"Activité",icon:"🎯",color:"#4A9EE0"},
  {id:"h",label:"Hôtel",icon:"🏨",color:"#4CAF7D"},
  {id:"s",label:"Shopping",icon:"🛍️",color:"#A06CD5"},
  {id:"e",label:"Excursion",icon:"🌅",color:"#E8883A"},
];}

const gc=id=>S.cats.find(c=>c.id===id)||{color:"#888",icon:"📌",label:"?"};
const gz=id=>S.zones.find(z=>z.id===id)||null;
const stars=v=>"★".repeat(v)+"☆".repeat(5-v);
const h=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const hpre=s=>h(s).replace(/\n/g,"&#10;");
let _t;const toast=m=>{const t=document.getElementById("toast");t.textContent=m;t.style.display="block";clearTimeout(_t);_t=setTimeout(()=>t.style.display="none",2400);};

function filtered(){
  let r=S.items.filter(i=>{
    if(S.tab!=="tout"&&i.catId!==S.tab)return false;
    if(S.search&&![i.name,i.loc,i.desc].join(" ").toLowerCase().includes(S.search.toLowerCase()))return false;
    if(S.filterCat&&i.catId!==S.filterCat)return false;
    if(S.filterZone&&i.zoneId!==S.filterZone)return false;
    if(S.filterPrice){
      if(S.filterPrice==="gratuit"){if((i.price||"").toLowerCase()!=="gratuit"&&getMinPrice(i)!==0){return false;}}
      else{
        var parts=S.filterPrice.split("-");
        var pmin=parseFloat(parts[0]),pmax=parseFloat(parts[1]);
        var iMin=getMinPrice(i);
        if(iMin===null){return false;}
        if(iMin<pmin||iMin>pmax){return false;}
      }
    }
    return true;
  });
  if(S.sortBy==="note_desc")r.sort(function(a,b){return(b.stars||0)-(a.stars||0);});
  else if(S.sortBy==="note_asc")r.sort(function(a,b){return(a.stars||0)-(b.stars||0);});
  else if(S.sortBy==="prix_asc")r.sort(function(a,b){return(getMinPrice(a)||9999)-(getMinPrice(b)||9999);});
  else if(S.sortBy==="prix_desc")r.sort(function(a,b){return(getMinPrice(b)||0)-(getMinPrice(a)||0);});
  else r.sort(function(a,b){return(a.name||"").localeCompare(b.name||"");});
  return r;
}

// ── MAP ───────────────────────────────────────────────────────────────────
function showMap(){
  const w=document.getElementById("mapWrap");
  const hh=document.getElementById("header").offsetHeight;
  const bn=document.getElementById("bottomNav");
  w.style.cssText="display:block;position:fixed;top:"+hh+"px;left:0;right:0;bottom:"+(bn.offsetHeight||0)+"px;z-index:1";
  if(mMap){mMap.invalidateSize();refreshMk();return;}
  mMap=L.map("mapEl").setView([24.2,54.8],7);
  L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",{maxZoom:19}).addTo(mMap);
  L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}",{maxZoom:19}).addTo(mMap);
  refreshMk();
}
function hideMap(){document.getElementById("mapWrap").style.display="none";}
function refreshMk(){
  if(!mMap)return;
  mMarkers.forEach(m=>mMap.removeLayer(m));mMarkers=[];
  S.items.filter(i=>i.lat&&i.lng).forEach(item=>{
    const cat=gc(item.catId);
    const ico=L.divIcon({className:"",html:'<div class="mk-dot" style="background:'+cat.color+'">'+(cat.icon||"").slice(0,2)+'</div>',iconSize:[28,28],iconAnchor:[14,14],popupAnchor:[0,-16]});
    const mk=L.marker([item.lat,item.lng],{icon:ico}).addTo(mMap);

function initMini(lat,lng){
  const el=document.getElementById("miniMapContainer");if(!el)return;
  if(miniMap){miniMap.remove();miniMap=null;miniMk=null;}
  miniMap=L.map("miniMapContainer").setView(lat&&lng?[lat,lng]:[25.2,55.27],lat&&lng?14:9);
  L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",{maxZoom:19}).addTo(miniMap);
  L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}",{maxZoom:19}).addTo(miniMap);
  function mkIco(){const cat=gc(S.form?S.form.catId||"a":"a");return L.divIcon({className:"",html:'<div class="mk-dot" style="background:'+cat.color+'">'+(cat.icon||"").slice(0,2)+'</div>',iconSize:[28,28],iconAnchor:[14,14]});}
  if(lat&&lng){miniMk=L.marker([lat,lng],{icon:mkIco(),draggable:true}).addTo(miniMap);miniMk.on("dragend",function(e){const p=e.target.getLatLng();updCoords(p.lat,p.lng);});}
  miniMap.on("click",function(e){const la=e.latlng.lat,ln=e.latlng.lng;updCoords(la,ln);if(miniMk)miniMk.setLatLng([la,ln]);else{miniMk=L.marker([la,ln],{icon:mkIco(),draggable:true}).addTo(miniMap);miniMk.on("dragend",function(ev){const p=ev.target.getLatLng();updCoords(p.lat,p.lng);});}});
}
function updCoords(lat,lng){
  if(!S.form)return;
  S.form.lat=parseFloat(lat.toFixed(6));S.form.lng=parseFloat(lng.toFixed(6));
  const li=document.getElementById("latI"),lni=document.getElementById("lngI"),ci=document.getElementById("coordInfo");
  if(li)li.value=S.form.lat;if(lni)lni.value=S.form.lng;
  if(ci)ci.innerHTML='<span style="color:#4CAF7D">✓ '+S.form.lat.toFixed(4)+', '+S.form.lng.toFixed(4)+'</span> <button onclick="clearCoords()" style="background:none;border:none;color:#E05555;font-size:11px;cursor:pointer;margin-left:8px">✕ Retirer</button>';
}

      {v:"nom",     l:"🔤 Nom A → Z"},
      {v:"note_desc",l:"⭐ Note (meilleure en premier)"},
      {v:"note_asc", l:"⭐ Note (moins bonne en premier)"},
      {v:"prix_asc", l:"💰 Prix croissant"},
      {v:"prix_desc",l:"💰 Prix décroissant"}
    ];
    var sortBtns="";
    sorts.forEach(function(s){
      var on=S.sortBy===s.v;
      sortBtns+="<button id='fsb-"+s.v+"' style='width:100%;text-align:left;padding:10px 14px;border-radius:7px;border:1px solid "+(on?"#D4AF37":"#1E1E2A")+";background:"+(on?"#D4AF3715":"#0C0C18")+";color:"+(on?"#D4AF37":"#888")+";cursor:pointer;font-size:13px;font-family:inherit;margin-bottom:6px'>"+s.l+"</button>";
    });

    inner.innerHTML=
       '<div class="modal-handle"></div>'
      +'<div style="font-size:16px;color:#D4AF37;margin-bottom:20px;font-weight:700">⚙️ Filtres & Tri</div>'
      +'<label class="lbl">Catégorie</label>'
      +'<select id="fp-cat" style="margin-bottom:14px">'+cO+'</select>'
      +'<label class="lbl">Quartier</label>'
      +'<select id="fp-zone" style="margin-bottom:14px">'+zO+'</select>'
      +'<label class="lbl">Prix</label>'
      +'<select id="fp-price" style="margin-bottom:18px">'+pO+'</select>'
      +'<label class="lbl" style="margin-bottom:10px">Trier par</label>'
      +sortBtns
      +'<div style="display:flex;gap:8px;margin-top:8px">'
      +'<button id="fp-reset" class="btn-o" style="flex:1">🗑️ Réinitialiser</button>'
      +'<button id="fp-apply" class="btn-g" style="flex:2">Appliquer ✓</button>'
      +'</div>';

    fpWrap.appendChild(inner);
    document.getElementById("modals").appendChild(fpWrap);

    // Sort button interactions
    sorts.forEach(function(s){
      var btn=document.getElementById("fsb-"+s.v);
      if(!btn)return;
      btn.addEventListener("click",function(){
        S.sortBy=s.v;
        sorts.forEach(function(s2){
          var b=document.getElementById("fsb-"+s2.v);
          if(!b)return;
          var on2=s2.v===s.v;
          b.style.borderColor=on2?"#D4AF37":"#1E1E2A";
          b.style.background=on2?"#D4AF3715":"#0C0C18";
          b.style.color=on2?"#D4AF37":"#888";
        });
      });
    });

    document.getElementById("fp-reset").addEventListener("click",function(){
      S.filterCat="";S.filterZone="";S.filterPrice="";S.sortBy="nom";S.filterPanel=false;render();
    });
    document.getElementById("fp-apply").addEventListener("click",function(){
      S.filterCat=document.getElementById("fp-cat").value;
      S.filterZone=document.getElementById("fp-zone").value;
      S.filterPrice=document.getElementById("fp-price").value;
      S.filterPanel=false;render();
    });
  }

  if(catForm){const l=document.getElementById("cf-label"),i=document.getElementById("cf-icon");if(l){l.value=catForm.label||"";l.focus();}if(i)i.value=catForm.icon||"";}
  if(zoneForm){const l=document.getElementById("zf-label");if(l){l.value=zoneForm.label||"";l.focus();}}
  if(form)setTimeout(function(){initMini(form.lat,form.lng);},60);
  else if(miniMap){miniMap.remove();miniMap=null;miniMk=null;}
}

window.clearCoords=function(){if(S.form){S.form.lat=null;S.form.lng=null;}if(miniMk&&miniMap){miniMap.removeLayer(miniMk);miniMk=null;}var li=document.getElementById("latI"),lni=document.getElementById("lngI"),ci=document.getElementById("coordInfo");if(li)li.value="";if(lni)lni.value="";if(ci)ci.innerHTML="";};

window.doSubmit=function(){var f=S.form;if(!f||!f.name.trim())return toast("⚠️ Le nom est requis");var _new=f._new;var entry=Object.assign({},f);delete entry._new;S.items=_new?S.items.concat([Object.assign({},entry,{id:Date.now()})]):S.items.map(function(i){return i.id===entry.id?entry:i;});saveI();S.form=null;render();toast(_new?"✅ Ajouté !":"✏️ Mis à jour !");};

window.toggleTip=function(btn){
  // Close others
  document.querySelectorAll('.tooltip-btn.open').forEach(function(b){
    if(b!==btn){b.classList.remove('open');}
  });

  var isOpen=btn.classList.contains('open');
  btn.classList.toggle('open');

  if(!isOpen){
    var box=btn.nextElementSibling;
    if(!box)return;

    // 1. Set text FIRST (preserves newlines via pre-wrap)
    var key=btn.dataset.key;
    if(key&&tipDescs[key]){
      box.textContent=tipDescs[key];
    }

    // 2. Make visible temporarily to measure
    box.style.visibility='hidden';
    box.style.display='block';

    // 3. Position
    var rect=btn.getBoundingClientRect();
    var bw=260;
    var bh=box.offsetHeight||150;
    var vw=window.innerWidth, vh=window.innerHeight;
    var top=rect.bottom+8;
    if(top+bh>vh-10) top=rect.top-bh-8;
    if(top<10) top=10;
    var left=rect.left+rect.width/2-bw/2;
    if(left<10) left=10;
    if(left+bw>vw-10) left=vw-bw-10;
    box.style.top=top+'px';
    box.style.left=left+'px';

    // 4. Show properly via CSS class
    box.style.display='';
    box.style.visibility='';

    // 5. Close on outside click
    setTimeout(function(){
      document.addEventListener('click',function handler(e){
        if(!btn.parentNode.contains(e.target)){
          btn.classList.remove('open');
          document.removeEventListener('click',handler);
        }
      });
    },10);
  }
};

window.openLogin=function(){S.loginForm=true;renderModals();};
window.closeLogin=function(){S.loginForm=false;renderModals();};
window.doLogin=function(){
  var u=document.getElementById("login-user").value.trim();
  var p=document.getElementById("login-pass").value;
  var found=S.users.find(function(x){return x.username===u&&x.password===p;});
  if(found){
    S.session=found;
    localStorage.setItem("uae-session",JSON.stringify({id:found.id,password:found.password}));
    S.loginForm=false;
    render();
    toast("👋 Bonjour "+found.username+" !");
  } else {
    document.getElementById("login-err").style.display="block";
  }
};
window.doLogout=function(){
  S.session=null;
  localStorage.removeItem("uae-session");
  render();
  toast("👋 Déconnecté");
};
window.openUserPanel=function(){S.userPanel=true;renderModals();};
window.closeUserPanel=function(){S.userPanel=false;renderModals();};
window.doAddUser=function(){
  var un=document.getElementById("nu-user").value.trim();
  var pw=document.getElementById("nu-pass").value.trim();
  if(!un||!pw)return toast("⚠️ Remplis tous les champs");
  if(S.users.find(function(u){return u.username===un;}))return toast("⚠️ Nom déjà utilisé");
  var droits={consulter:!!document.getElementById("d-consulter").checked,creer:!!document.getElementById("d-creer").checked,modifier:!!document.getElementById("d-modifier").checked,supprimer:!!document.getElementById("d-supprimer").checked,categories:!!document.getElementById("d-categories").checked,quartiers:!!document.getElementById("d-quartiers").checked,utilisateurs:!!document.getElementById("d-utilisateurs").checked};
  S.users.push({id:"u-"+Date.now(),username:un,password:pw,droits:droits});
  saveU();renderModals();toast("✅ Utilisateur créé !");
};
window.doDelUser=function(id){
  if(S.session&&S.session.id===id)return toast("⚠️ Tu ne peux pas te supprimer toi-même");
  S.users=S.users.filter(function(u){return u.id!==id;});
  saveU();renderModals();toast("🗑️ Utilisateur supprimé");
};
window.doEditUser=function(id){
  var u=S.users.find(function(u){return u.id===id;});
  if(!u)return;
  var un=document.getElementById("eu-user-"+id).value.trim();
  var pw=document.getElementById("eu-pass-"+id).value.trim();
  if(un)u.username=un;
  if(pw)u.password=pw;
  var dkeys=["consulter","creer","modifier","supprimer","categories","quartiers","utilisateurs"];
  dkeys.forEach(function(d){var el=document.getElementById("eu-"+d+"-"+id);if(el)u.droits[d]=el.checked;});
  if(S.session&&S.session.id===id)S.session=u;
  saveU();renderModals();toast("✅ Modifié !");
};
